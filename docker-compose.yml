# Docker compose for reproducible local/CI environment.
# Local dev on Windows defaults to Laragon, this is for CI and "git clone && make up".
#
# Dev web (hot reload):  docker compose up -d
# Production web image:  docker compose --profile production up -d web-prod

services:
  db:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: tours
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tours"]
      interval: 5s
      timeout: 3s
      retries: 10

  embeddings:
    build:
      context: ./services/embeddings
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      HOST: 0.0.0.0
      PORT: 8001
      USE_STUB: "false"
      MODEL_ID: models/intfloat-multilingual-e5-small
      EMBEDDING_DIM: "384"
      HF_HUB_OFFLINE: "1"
    volumes:
      - ./services/embeddings/models:/app/models:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8001/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  api:
    build:
      context: ./apps/api
      dockerfile: ../../docker/Dockerfile.api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      embeddings:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: tours
      DB_USERNAME: postgres
      DB_PASSWORD: root
      EMBEDDINGS_URL: http://embeddings:8001
      QUEUE_CONNECTION: database
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/var/www/html

  queue:
    build:
      context: ./apps/api
      dockerfile: ../../docker/Dockerfile.api
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3"]
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      APP_ENV: local
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: tours
      DB_USERNAME: postgres
      DB_PASSWORD: root
      EMBEDDINGS_URL: http://embeddings:8001
      QUEUE_CONNECTION: database
    volumes:
      - ./apps/api:/var/www/html

  web:
    build:
      context: ./apps/web
      dockerfile: ../../docker/Dockerfile.web
      target: dev
    restart: unless-stopped
    depends_on:
      - api
    environment:
      PUBLIC_ENV__PUBLIC_API_URL: http://api:8000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app

  web-prod:
    profiles: [production]
    build:
      context: ./apps/web
      dockerfile: ../../docker/Dockerfile.web
      target: production
    restart: unless-stopped
    depends_on:
      - api
    environment:
      PUBLIC_ENV__PUBLIC_API_URL: http://api:8000
    ports:
      - "3000:3000"

volumes:
  db-data:
