name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tours_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tours_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql
      - name: Configure env
        working-directory: apps/api
        run: |
          cp .env.example .env
          mkdir -p storage/framework/views storage/framework/cache/data storage/framework/sessions bootstrap/cache
          echo "DB_CONNECTION=pgsql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_DATABASE=tours_test" >> .env
          echo "DB_USERNAME=postgres" >> .env
          echo "DB_PASSWORD=postgres" >> .env
      - name: Install API deps
        working-directory: apps/api
        run: composer install --no-interaction --prefer-dist
      - name: Publish Filament assets
        working-directory: apps/api
        run: |
          php artisan vendor:publish --tag=filament-actions-translations --force --no-ansi
          php artisan vendor:publish --tag=filament-forms-translations --force --no-ansi
          php artisan vendor:publish --tag=filament-tables-translations --force --no-ansi
          php artisan vendor:publish --tag=filament-notifications-translations --force --no-ansi
          php artisan vendor:publish --tag=filament-panels-translations --force --no-ansi
          php artisan vendor:publish --tag=filament-translations --force --no-ansi
          php artisan filament:assets --no-ansi
      - name: Generate app key
        working-directory: apps/api
        run: php artisan key:generate
      - name: Migrate
        working-directory: apps/api
        run: |
          PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -d tours_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
          php artisan migrate --force
      - name: Pest (PostgreSQL)
        working-directory: apps/api
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: tours_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
        run: ./vendor/bin/pest

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install and unit tests
        working-directory: apps/web
        run: |
          npm ci
          npm test -- --run
      - name: Production build
        working-directory: apps/web
        run: npm run build

  web-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install Playwright browsers
        working-directory: apps/web
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Build and smoke e2e
        working-directory: apps/web
        env:
          CI: true
          PLAYWRIGHT_CHANNEL: chromium
          PUBLIC_ENV__PUBLIC_API_URL: http://127.0.0.1:8000
          MOCK_API_HOST: 127.0.0.1
          MOCK_API_PORT: '8000'
        run: npm run test:e2e:ci

  embeddings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
        working-directory: services/embeddings
      - run: pytest
        working-directory: services/embeddings
